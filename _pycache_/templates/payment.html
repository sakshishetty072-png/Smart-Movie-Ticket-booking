<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Movie Magic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #141414;
            font-family: Arial, sans-serif;
            color: white;
            min-height: 100vh;
        }
        
        .navbar {
            background: #e50914 !important;
            padding: 15px;
        }
        
        .navbar-brand {
            color: white !important;
            font-size: 24px;
            font-weight: bold;
        }
        
        .container {
            max-width: 800px;
            padding: 30px;
        }
        
        .payment-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }
        
        .total-row {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            padding: 20px 0;
        }
        
        .form-control {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            margin-bottom: 15px;
        }
        
        .form-control:focus {
            background: #444;
            border-color: #e50914;
            color: white;
        }
        
        .btn-pay {
            background: #e50914;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-pay:hover {
            background: #b20710;
        }
        
        .btn-back {
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .seat-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        
        .seat-tag {
            background: #e50914;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">🎬 Movie Magic</a>
            <a href="/dashboard" class="btn-back">← Back</a>
        </div>
    </nav>

    <div class="container">
        <div class="payment-box">
            <h2>💳 Payment</h2>
            
            <div class="summary-row">
                <span>Movie</span>
                <span>{{ movie }}</span>
            </div>
            <div class="summary-row">
                <span>Theater</span>
                <span>{{ theater }}</span>
            </div>
            <div class="summary-row">
                <span>Seats</span>
                <span>{{ seats_count }}</span>
            </div>
            <div class="summary-row">
                <span>Price per seat</span>
                <span>₹{{ price }}</span>
            </div>
            
            {% if selected_seats %}
            <div class="summary-row">
                <span>Selected Seats</span>
                <div class="seat-tags">
                    {% for seat in selected_seats.split(',') %}
                        <span class="seat-tag">{{ seat }}</span>
                    {% endfor %}
                </div>
            {% endif %}
            
            <div class="summary-row total-row">
                <span>Total</span>
                <span>₹{{ total_price }}</span>
            </div>
            
            <form method="POST" action="/confirmation" style="margin-top: 30px;">
                <input type="hidden" name="movie" value="{{ movie }}">
                <input type="hidden" name="theater" value="{{ theater }}">
                <input type="hidden" name="selected_seats" value="{{ selected_seats }}">
                <input type="hidden" name="total_price" value="{{ total_price }}">
                
                <h4>Card Details</h4>
                <input type="text" class="form-control" placeholder="Card Number" value="1234 5678 9012 3456">
                <div class="row">
                    <div class="col">
                        <input type="text" class="form-control" placeholder="Expiry (MM/YY)" value="12/25">
                    </div>
                    <div class="col">
                        <input type="text" class="form-control" placeholder="CVV" value="123">
                    </div>
                <input type="text" class="form-control" placeholder="Card Holder Name" value="John Doe">
                
                <button type="submit" class="btn-pay">
                    🔒 Pay ₹{{ total_price }}
                </button>
            </form>
        </div>
</body>
</html>
