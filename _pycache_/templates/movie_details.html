<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }} - Movie Magic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}"><i class="fas fa-film me-2"></i>Movie Magic</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('dashboard') }}">Movies</a>
                <a class="nav-link" href="{{ url_for('profile') }}">Profile</a>
                <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container py-5">
        <div class="row">
            <div class="col-md-4">
                <img src="{{ movie.image or 'https://via.placeholder.com/300x400?text=No+Poster' }}" class="img-fluid rounded">
            </div>
            <div class="col-md-8">
                <h1>{{ movie.title }}</h1>
                <p class="text-muted">
                    <span class="badge bg-primary">{{ movie.genre }}</span>
                    <span class="badge bg-secondary">{{ movie.language }}</span>
                    <span class="ms-2"><i class="fas fa-star text-warning"></i> {{ movie.rating }}</span>
                </p>
                <p><strong>Duration:</strong> {{ movie.duration }} min</p>
                <p><strong>Theater:</strong> {{ movie.theater }}</p>
                <p><strong>Address:</strong> {{ movie.address }}</p>
                <p>{{ movie.description }}</p>
                <h3 class="text-primary">Rs. {{ movie.price }}</h3>
                <a href="{{ url_for('booking', movie=movie.title, theater=movie.theater, address=movie.address, price=movie.price) }}" class="btn btn-primary btn-lg">
                    <i class="fas fa-ticket-alt me-2"></i>Book Now
                </a>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-lg">Back</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
