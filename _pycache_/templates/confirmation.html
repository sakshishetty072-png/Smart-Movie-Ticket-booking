<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Movie Magic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #141414;
            font-family: Arial, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .confirm-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
            max-width: 500px;
        }
        
        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        .booking-id {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #e50914;
            margin: 20px 0;
        }
        
        .details {
            text-align: left;
            margin: 20px 0;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        
        .btn-home {
            background: #e50914;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        
        .btn-home:hover {
            background: #b20710;
            color: white;
        }
        
        .seat-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .seat-tag {
            background: #e50914;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="confirm-box">
        <div class="success-icon">✅</div>
        <h2>Booking Confirmed!</h2>
        <p>Your tickets have been booked successfully.</p>
        
        <div class="booking-id">
            Booking ID: {{ booking_id }}
        </div>
        
        <div class="details">
            <div class="detail-row">
                <span>Movie</span>
                <span>{{ movie }}</span>
            </div>
            <div class="detail-row">
                <span>Theater</span>
                <span>{{ theater }}</span>
            </div>
            <div class="detail-row">
                <span>Seats</span>
                <span>{{ seats }}</span>
            </div>
            <div class="detail-row">
                <span>Total Paid</span>
                <span style="color: #4CAF50; font-weight: bold;">₹{{ total }}</span>
            </div>
        
        <p style="color: #888; margin-top: 20px;">
            A confirmation email has been sent to your registered email address.
        </p>
        
        <a href="/dashboard" class="btn-home">🎬 Book More Movies</a>
    </div>
</body>
</html>
