<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Movie Magic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; font-family: Arial, sans-serif; }
        .navbar { background: #e50914 !important; padding: 15px; }
        .navbar-brand { color: white !important; font-size: 24px; font-weight: bold; }
        .container { max-width: 600px; padding: 30px; }
        .content-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .form-control { background: #333; border: 1px solid #444; color: white; padding: 12px; margin-bottom: 15px; }
        .form-control:focus { background: #444; border-color: #e50914; color: white; }
        .btn-submit { background: #e50914; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; font-size: 16px; }
        .btn-back { background: #333; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">🎬 Movie Magic</a>
            <a href="/dashboard" class="btn-back">← Back</a>
        </div>
    </nav>
    <div class="container">
        <div class="content-box">
            <h2>Contact Us</h2>
            <form>
                <input type="text" class="form-control" placeholder="Your Name">
                <input type="email" class="form-control" placeholder="Your Email">
                <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
            <div style="margin-top: 30px; color: #888;">
                <p><strong>Email:</strong> support@moviemagic.com</p>
                <p><strong>Phone:</strong> +91 98765 43210</p>
                <p><strong>Address:</strong> Movie Magic, Bangalore, India</p>
            </div>
    </div>
</body>
</html>
