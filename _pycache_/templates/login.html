<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Movie Magic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #141414;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            border: 1px solid #333;
        }
        .form-control {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            margin-bottom: 15px;
        }
        .form-control:focus {
            background: #444;
            border-color: #e50914;
            color: white;
        }
        .btn-login {
            background: #e50914;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
        }
        .btn-login:hover {
            background: #b20710;
        }
        .title {
            color: white;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .title span { color: #e50914; }
        .link { color: #888; text-align: center; margin-top: 20px; }
        .link a { color: #e50914; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="title">🎬 Movie <span>Magic</span></div>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div style="background: #333; color: #e50914; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="/login">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn-login">Login</button>
        </form>
        
        <div class="link">
            Don't have an account? <a href="/signup">Sign Up</a>
        </div>
</body>
</html>
