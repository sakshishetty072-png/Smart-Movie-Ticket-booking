<!DOCTYPE html>
<html>
<head>
  <title>Search Results - MovieMagic</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h2>Search Results for {{ city }} ({{ language }})</h2>
  <div class="movie-grid">
  {% for m in movies %}
    <div class="movie-card">
      <h3>{{ m.title }}</h3>
      <p>{{ m.desc }}</p>
      <p><strong>Genre:</strong> {{ m.genre }}</p>
      <a href="{{ url_for('book', movie_id=m.movie_id) }}" class="btn">Book Now</a>
    </div>
  {% endfor %}
  </div>
</body>
</html>
